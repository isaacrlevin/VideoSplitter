name: Website PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'website/**'
      - '.github/workflows/website-pr-preview.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    name: Build & Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: website

      - name: Build with Jekyll
        working-directory: website
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        id: artifact
        with:
          name: website-preview-pr-${{ github.event.pull_request.number }}
          path: website/_site
          retention-days: 7

      - name: Post preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}#artifacts`;
            const body = [
              '## 🔍 Website Preview',
              '',
              'The website has been built successfully for this PR. To preview it:',
              '',
              `1. Go to the [workflow run](${runUrl}) and scroll down to the **Artifacts** section`,
              `2. Download the \`website-preview-pr-${{ github.event.pull_request.number }}\` artifact`,
              '3. Extract the zip file and open `index.html` in your browser',
              '',
              '> **Note:** Links between pages may not work when opened directly from the filesystem.',
              '> For full navigation, serve the folder locally:',
              '> ```',
              '> cd website-preview-pr-${{ github.event.pull_request.number }}',
              '> python3 -m http.server 8080',
              '> ```',
              '> Then open http://localhost:8080 in your browser.',
              '',
              `_Built from commit ${context.sha.substring(0, 7)} — artifact expires in 7 days_`,
            ].join('\n');

            const marker = '## 🔍 Website Preview';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  cleanup:
    name: Cleanup Preview Comment
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Update preview comment on close
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '## 🔍 Website Preview';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith(marker)
            );

            if (existing) {
              const action = context.payload.pull_request.merged ? 'merged' : 'closed';
              const body = [
                '## 🔍 Website Preview',
                '',
                `> ℹ️ This PR has been ${action}. The preview artifact has expired.`,
              ].join('\n');

              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            }
