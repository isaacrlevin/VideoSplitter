title: VideoSplitter
description: AI-powered video segment extraction for short-form content creation on TikTok, YouTube Shorts, and Instagram Reels.
theme: just-the-docs

url: "https://isaacrlevin.github.io"
baseurl: "/VideoSplitter"

permalink: pretty

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

nav_sort: order

aux_links:
  "GitHub Repository":
    - "https://github.com/isaacrlevin/VideoSplitter"

aux_links_new_tab: true

footer_content: "Copyright &copy; 2026 VideoSplitter Contributors. Distributed by an <a href=\"https://github.com/isaacrlevin/VideoSplitter/blob/main/LICENSE\">MIT license.</a>"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Build settings
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
